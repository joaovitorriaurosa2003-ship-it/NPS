<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pesquisa de Satisfação</title>
<style>
  :root {
    --primary: #2E2B28;
    --bg: #FAFAF8;
    --card: #FFFFFF;
    --border: #E5E3DD;
    --text: #1A1A1A;
    --text-secondary: #6B6B66;
    --danger: #C0392B;
    --success: #2E7D32;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 32px 20px 80px; }
  .wrap.wide { max-width: 1000px; }
  h1 { font-size: 24px; margin: 0 0 4px; }
  h2 { font-size: 19px; margin: 0 0 16px; }
  p.subtitle { color: var(--text-secondary); font-size: 14px; margin: 0 0 28px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 16px;
  }
  label { font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 6px; font-weight: 500; }
  input[type=text], input[type=email], input[type=password], input[type=color], textarea, select {
    width: 100%;
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    background: #fff;
    color: var(--text);
  }
  textarea { resize: vertical; min-height: 80px; }
  button {
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    padding: 11px 18px;
    cursor: pointer;
    background: var(--primary);
    color: #fff;
  }
  button.secondary { background: #fff; color: var(--text); border: 1px solid var(--border); }
  button.danger { background: var(--danger); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  a { color: inherit; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .row.between { justify-content: space-between; }
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px;
  }
  .top-bar .logo { font-weight: 700; font-size: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--border); }
  th { color: var(--text-secondary); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .muted { color: var(--text-secondary); font-size: 13px; }
  .error { color: var(--danger); font-size: 13px; margin: -8px 0 12px; }
  .likert { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 24px 0 8px; }
  .likert button.opt {
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 16px 6px 12px;
    text-align: center;
    color: var(--text);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .likert button.opt .emoji { font-size: 30px; }
  .likert button.opt .lbl { font-size: 11px; font-weight: 600; line-height: 1.2; }
  .likert button.opt.selected { border-color: var(--primary); background: color-mix(in srgb, var(--primary) 8%, white); }
  .thanks { text-align: center; padding: 60px 20px; }
  .thanks .big { font-size: 48px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-row .emoji { width: 26px; font-size: 18px; }
  .bar-track { flex: 1; background: #F0EFEA; border-radius: 6px; height: 14px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--primary); }
  .bar-row .count { width: 34px; text-align: right; font-size: 12px; color: var(--text-secondary); }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-grid .stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
  .stat-grid .stat .num { font-size: 26px; font-weight: 700; }
  .stat-grid .stat .lbl { font-size: 12px; color: var(--text-secondary); }
  .center-screen { min-height: 70vh; display: flex; align-items: center; justify-content: center; }
  .link-box { background: #F5F4F0; border-radius: 8px; padding: 10px 12px; font-size: 13px; word-break: break-all; margin-bottom: 12px; }
  footer.note { text-align: center; font-size: 12px; color: var(--text-secondary); margin-top: 24px; }

  /* ---- Perguntas da pesquisa de pós-venda ---- */
  .q-block { margin-bottom: 28px; }
  .q-block .q-label { font-size: 15px; font-weight: 600; margin: 0 0 4px; }
  .q-block .q-helper { font-size: 12px; color: var(--text-secondary); margin: 0 0 12px; }
  .stars-row { display: flex; gap: 6px; }
  .stars-row button {
    background: none; border: none; padding: 2px; font-size: 34px; line-height: 1;
    color: #DCD9D0; cursor: pointer;
  }
  .stars-row button.filled { color: #E0A82E; }
  .stars-sub { font-size: 12px; color: var(--text-secondary); margin-top: 6px; min-height: 16px; }
  .choice-list { display: flex; flex-direction: column; gap: 8px; }
  .choice-list button {
    background: #fff; border: 2px solid var(--border); border-radius: 10px;
    padding: 12px 14px; text-align: left; color: var(--text); font-weight: 500; font-size: 14px;
  }
  .choice-list button.selected { border-color: var(--primary); background: color-mix(in srgb, var(--primary) 8%, white); }
  .nps-grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
  .nps-grid button {
    background: #fff; border: 2px solid var(--border); border-radius: 8px;
    padding: 10px 0; text-align: center; color: var(--text); font-size: 14px; font-weight: 600;
  }
  .nps-grid button.selected { border-color: var(--primary); background: var(--primary); color: #fff; }
  .nps-caption { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary); margin-top: 6px; }
  .survey-links { display: flex; flex-direction: column; gap: 4px; }
  .survey-links .sl-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .survey-links .sl-tag { font-size: 11px; font-weight: 700; color: var(--text-secondary); width: 76px; }

  @media (max-width: 480px) {
    .wrap { padding: 20px 14px 60px; }
    .card { padding: 18px; }
    h1 { font-size: 20px; }
    .likert { grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .likert button.opt { padding: 10px 2px 8px; }
    .likert button.opt .emoji { font-size: 22px; }
    .likert button.opt .lbl { font-size: 9px; }
    .stars-row button { font-size: 28px; }
    .nps-grid { grid-template-columns: repeat(6, 1fr); }
    .stat-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-grid .stat { padding: 10px; }
    .stat-grid .stat .num { font-size: 20px; }
    table { font-size: 12px; }
  }
</style>
</head>
<body>

// ----------------------------------------------------------------------
// Escala Likert de 5 pontos
// ----------------------------------------------------------------------
const LIKERT = [
  { value: 1, emoji: "😡", label: "Muito insatisfeito", color: "#C0392B" },
  { value: 2, emoji: "😕", label: "Insatisfeito",        color: "#E08A2B" },
  { value: 3, emoji: "😐", label: "Neutro",               color: "#B8976A" },

function slugify(str) {
  return str.toLowerCase().trim()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/(^-|-$)/g, "");
}

// Lê um arquivo de imagem e devolve { dataUrl, dominantColor } — a cor
// dominante é calculada amostrando os pixels num canvas, ignorando tons
// quase brancos/pretos e pixels transparentes, pra pegar a cor "de marca"
// do logo em vez do fundo.
function readLogoFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const size = 60;
        const canvas = document.createElement("canvas");
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, size, size);
        let r = 0, g = 0, b = 0, n = 0;
        try {
          const data = ctx.getImageData(0, 0, size, size).data;
          for (let i = 0; i < data.length; i += 4) {
            const [pr, pg, pb, pa] = [data[i], data[i+1], data[i+2], data[i+3]];
            if (pa < 100) continue;
            const sum = pr + pg + pb;
            if (sum > 720 || sum < 45) continue; // ignora quase-branco / quase-preto
            r += pr; g += pg; b += pb; n++;
          }
        } catch (e) { /* imagem de outra origem sem CORS: mantém cor padrão */ }
        const toHex = v => v.toString(16).padStart(2, "0");
        const dominantColor = n > 0
          ? "#" + toHex(Math.round(r/n)) + toHex(Math.round(g/n)) + toHex(Math.round(b/n))
          : null;
        resolve({ dataUrl: reader.result, dominantColor });
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadLogo(slug, file) {
  const ext = (file.name.split(".").pop() || "png").toLowerCase();
  const fileRef = ref(storage, `logos/${slug}-${Date.now()}.${ext}`);
  await uploadBytes(fileRef, file);
  return getDownloadURL(fileRef);
}
// Cabeçalho com a logo da empresa (se houver) acima do nome, usado nas
// páginas públicas de pesquisa.
function companyHeaderHtml(company) {
  const logo = company.logoUrl
    ? `<img src="${company.logoUrl}" alt="${escapeHtml(company.name)}" style="max-height:64px;max-width:220px;object-fit:contain;margin-bottom:14px" />`
    : "";
  return `${logo}`;
}

function fmtDate(ts) {
  if (!ts) return "-";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString("pt-BR", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
}
function likertOf(score) {
  return LIKERT.find(l => l.value === Number(score)) || LIKERT[2];
}

// ----------------------------------------------------------------------
// Pesquisa de pós-venda / experiência — perguntas fixas, usadas por
// qualquer empresa. {empresa} é substituído pelo nome cadastrado.
// ----------------------------------------------------------------------
const POSVENDA_QUESTIONS = [
  { id: "q1", type: "stars", required: true,
    label: "Como você avalia sua experiência geral na {empresa}?",
    starLabels: ["Muito ruim", "Ruim", "Regular", "Boa", "Excelente"] },
  { id: "q2", type: "stars", required: true,
    label: "Como foi o atendimento recebido?" },
  { id: "q3", type: "choice", required: true,
    label: "Você encontrou facilmente o que procurava?",
    options: ["Sim", "Encontrei algo parecido", "Não encontrei"] },
  { id: "q4", type: "stars", required: true,
    label: "Como você avalia nossos produtos?",
    helper: "Pode considerar: qualidade • variedade • apresentação" },
  { id: "q5", type: "choice", required: true,
    label: "Durante o atendimento você se sentiu...",
    options: ["Muito bem acolhido", "Bem atendido", "Atendimento normal", "Pouco acolhido", "Mal atendido"] },
  { id: "q6", type: "nps", required: true,
    label: "Em uma escala de 0 a 10, qual a probabilidade de indicar a {empresa} para um amigo?" },
  { id: "q7", type: "text", required: false,
    label: "Se pudesse melhorar apenas UMA coisa na sua experiência, o que seria?" }
];
function fillCompanyName(str, name) { return str.replace("{empresa}", name); }
function npsLevelOf(score) {
  score = Number(score);
  if (score >= 9) return { key: "promotor", label: "Promotor", color: "#2E7D32" };
  if (score >= 7) return { key: "neutro", label: "Neutro", color: "#B8976A" };
  return { key: "detrator", label: "Detrator", color: "#C0392B" };
}

// Conta regressiva na tela de "obrigado" das pesquisas públicas: mostra o
// tempo restante, atualiza o botão de retorno manual e, ao zerar, recarrega
// a própria tela (limpando as respostas) chamando render() de novo.
function startReturnTimer(seconds = 15) {
  let remaining = seconds;
  const timerEl = document.getElementById("timer-txt");
  const voltarBtn = document.getElementById("voltar-btn");
  const update = () => { if (timerEl) timerEl.textContent = `Voltando para a avaliação em ${remaining}s...`; };
  update();
  const interval = setInterval(() => {
    remaining--;
    if (remaining <= 0) { clearInterval(interval); render(); return; }
    update();
  }, 1000);
  if (voltarBtn) voltarBtn.onclick = () => { clearInterval(interval); render(); };
}

const app = document.getElementById("app");

// ----------------------------------------------------------------------
// Router simples baseado em hash
// #/                          -> redireciona para /admin ou /login
// #/login                     -> tela de login do admin
// #/admin                     -> lista de empresas
// #/admin/nova                -> cadastrar nova empresa
// #/admin/empresa/{slug}                -> respostas do NPS da empresa
// #/admin/empresa/{slug}/pos-venda      -> respostas do pós-venda da empresa
// #/empresa/{slug}                      -> página pública do NPS
// #/empresa/{slug}/pos-venda            -> página pública do pós-venda
// ----------------------------------------------------------------------
window.addEventListener("hashchange", render);
onAuthStateChanged(auth, () => render());

function currentUser() { return auth.currentUser; }

function navigate(hash) { window.location.hash = hash; }

async function render() {
  const hash = window.location.hash.replace(/^#\/?/, "");
  const parts = hash.split("/").filter(Boolean);

  if (parts[0] === "empresa" && parts[1] && parts[2] === "pos-venda") {
    return renderPublicPosVenda(parts[1]);
  }
  if (parts[0] === "empresa" && parts[1]) {
    return renderPublicSurvey(parts[1]);
  }
  if (parts[0] === "login") {
    return renderLogin();
  }
  if (parts[0] === "admin" && parts[1] === "nova") {
    if (!currentUser()) return renderLogin();
    return renderNovaEmpresa();
  }
  if (parts[0] === "admin" && parts[1] === "empresa" && parts[2] && parts[3] === "editar") {
    if (!currentUser()) return renderLogin();
    return renderEditarEmpresa(parts[2]);
  }
  if (parts[0] === "admin" && parts[1] === "empresa" && parts[2] && parts[3] === "pos-venda") {
    if (!currentUser()) return renderLogin();
    return renderPosVendaResultados(parts[2]);
  }
  if (parts[0] === "admin" && parts[1] === "empresa" && parts[2]) {
    if (!currentUser()) return renderLogin();
    return renderRespostas(parts[2]);
  }
  if (parts[0] === "admin") {
    if (!currentUser()) return renderLogin();
    return renderAdminDashboard();
  }
  // raiz
  if (currentUser()) navigate("#/admin");
  else navigate("#/login");
}

// ---------------------------- LOGIN ------------------------------------
function renderLogin() {
  app.innerHTML = `
    <div class="center-screen">
      <div class="card" style="width:360px">
        <h2>Painel administrativo</h2>
        <p class="subtitle" style="margin-bottom:20px">Acesse com seu e-mail e senha do Firebase Auth.</p>
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="voce@empresa.com" />
        <label>Senha</label>
        <input type="password" id="login-pass" />
        <div class="error" id="login-error" style="display:none"></div>
        <button id="login-btn" style="width:100%">Entrar</button>
      </div>
    </div>
  `;
  document.getElementById("login-btn").onclick = async () => {
    const email = document.getElementById("login-email").value.trim();
    const pass = document.getElementById("login-pass").value;
    const errEl = document.getElementById("login-error");
    errEl.style.display = "none";
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      navigate("#/admin");
    } catch (e) {
      const map = {
        "auth/unauthorized-domain": "Este domínio não está autorizado no Firebase Auth (Authentication > Settings > Authorized domains).",
        "auth/invalid-credential": "E-mail ou senha incorretos.",
        "auth/user-not-found": "Não existe usuário com esse e-mail em Authentication > Users.",
        "auth/wrong-password": "Senha incorreta.",
        "auth/too-many-requests": "Muitas tentativas. Aguarde um pouco e tente de novo."
      };
      errEl.textContent = map[e.code] || ("Erro ao entrar: " + e.code);
      errEl.style.display = "block";
    }
  };
}

// ------------------------- ADMIN DASHBOARD ------------------------------
async function renderAdminDashboard() {
  app.innerHTML = `<div class="wrap wide"><p class="muted">Carregando empresas...</p></div>`;
  const snap = await getDocs(query(collection(db, "companies"), orderBy("createdAt", "desc")));
  const companies = [];
  snap.forEach(d => companies.push({ id: d.id, ...d.data() }));

  const origin = window.location.origin + window.location.pathname;
  const rows = companies.map(c => `
    <tr>
      <td>
        <div class="row" style="gap:10px;flex-wrap:nowrap">
          <div style="width:32px;height:32px;border-radius:8px;border:1px solid var(--border);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#F5F4F0">
            ${c.logoUrl ? `<img src="${c.logoUrl}" style="max-width:100%;max-height:100%" />` : ""}
          </div>
          <div><strong>${escapeHtml(c.name)}</strong><br><span class="muted">${c.slug}</span></div>
        </div>
      </td>
      <td><span class="pill" style="background:${c.primaryColor || "#2E2B28"}22;color:${c.primaryColor || "#2E2B28"}">●</span></td>
      <td>${fmtDate(c.createdAt)}</td>
      <td>
        <div class="survey-links">
          <div class="sl-row">
            <span class="sl-tag">NPS</span>
            <button class="secondary" data-copy="${origin}#/empresa/${c.slug}">Copiar link</button>
            <button class="secondary" data-view="${c.slug}">Ver respostas</button>
          </div>
          <div class="sl-row">
            <span class="sl-tag">Pós-venda</span>
            <button class="secondary" data-copy="${origin}#/empresa/${c.slug}/pos-venda">Copiar link</button>
            <button class="secondary" data-view-pv="${c.slug}">Ver respostas</button>
          </div>
        </div>
      </td>
      <td class="row">
        <button class="secondary" data-edit="${c.slug}">Editar</button>
        <button class="danger" data-del="${c.id}">Excluir</button>
      </td>
    </tr>
  `).join("");

  app.innerHTML = `
    <div class="wrap wide">
      <div class="top-bar">
        <div class="logo">Pesquisas de Satisfação · Admin</div>
        <button class="secondary" id="logout-btn">Sair</button>
      </div>
      <div class="row between" style="margin-bottom:20px">
        <h1 style="margin:0">Empresas</h1>
        <button id="nova-btn">+ Nova empresa</button>
      </div>
      ${companies.length === 0 ? `<div class="card"><p class="muted">Nenhuma empresa cadastrada ainda. Clique em "Nova empresa" para criar a primeira página de pesquisa.</p></div>` : `
      <div class="card" style="padding:0">
        <table>
          <thead><tr><th>Empresa</th><th>Cor</th><th>Criada em</th><th>Pesquisas</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`}
    </div>
  `;

  document.getElementById("logout-btn").onclick = async () => { await signOut(auth); navigate("#/login"); };
  document.getElementById("nova-btn").onclick = () => navigate("#/admin/nova");
  app.querySelectorAll("[data-view]").forEach(b => b.onclick = () => navigate("#/admin/empresa/" + b.dataset.view));
  app.querySelectorAll("[data-view-pv]").forEach(b => b.onclick = () => navigate("#/admin/empresa/" + b.dataset.viewPv + "/pos-venda"));
  app.querySelectorAll("[data-edit]").forEach(b => b.onclick = () => navigate("#/admin/empresa/" + b.dataset.edit + "/editar"));
  app.querySelectorAll("[data-copy]").forEach(b => b.onclick = () => {
    navigator.clipboard.writeText(b.dataset.copy);
    b.textContent = "Copiado!";
    setTimeout(() => b.textContent = "Copiar link", 1500);
  });
  app.querySelectorAll("[data-del]").forEach(b => b.onclick = async () => {
    if (!confirm("Excluir esta empresa? As respostas cadastradas não serão apagadas automaticamente.")) return;
    await deleteDoc(doc(db, "companies", b.dataset.del));
    renderAdminDashboard();
  });
}

// ------------------------- NOVA / EDITAR EMPRESA --------------------------
function renderNovaEmpresa() { renderEmpresaForm(null); }
async function renderEditarEmpresa(slug) {
  const snap = await getDoc(doc(db, "companies", slug));
  if (!snap.exists()) { navigate("#/admin"); return; }
  renderEmpresaForm({ id: snap.id, ...snap.data() });
}

function renderEmpresaForm(existing) {
  const isEdit = !!existing;
  let pendingFile = null;       // arquivo de logo selecionado, ainda não enviado
  let colorAutoSet = !isEdit;   // se a cor pode ser sobrescrita automaticamente pela logo

  app.innerHTML = `
    <div class="wrap">
      <div class="top-bar">
        <div class="logo">Pesquisas de Satisfação · Admin</div>
        <a href="#/admin"><button class="secondary">Voltar</button></a>
      </div>
      <h1>${isEdit ? "Editar empresa" : "Nova empresa"}</h1>
      <p class="subtitle">${isEdit ? "Atualize a logo, a cor ou o nome da empresa." : "Cria a página pública de pesquisa de satisfação para o cliente."}</p>
      <div class="card">
        <label>Nome da empresa</label>
        <input type="text" id="c-name" placeholder="Ex: Panificadora Pão Delícia" value="${isEdit ? escapeHtml(existing.name) : ""}" />
        <label>Endereço da página ${isEdit ? "" : "(gerado automaticamente, pode editar)"}</label>
        <input type="text" id="c-slug" placeholder="pao-delicia" value="${isEdit ? existing.slug : ""}" ${isEdit ? "disabled" : ""} />

        <label>Logo da empresa</label>
        <div class="row" style="align-items:flex-start;margin-bottom:16px">
          <div id="logo-preview" style="width:72px;height:72px;border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#F5F4F0;flex-shrink:0">
            ${existing && existing.logoUrl ? `<img src="${existing.logoUrl}" style="max-width:100%;max-height:100%" />` : `<span class="muted" style="font-size:11px">sem logo</span>`}
          </div>
          <div style="flex:1">
            <input type="file" id="c-logo" accept="image/*" style="margin-bottom:6px" />
            <p class="muted" style="font-size:12px;margin:0">A cor principal da página é sugerida automaticamente a partir da logo — você pode ajustar depois.</p>
          </div>
        </div>

        <label>Cor principal</label>
        <input type="color" id="c-color" value="${isEdit ? (existing.primaryColor || "#2E2B28") : "#2E2B28"}" />

        <div class="error" id="nova-error" style="display:none"></div>
        <button id="salvar-btn">${isEdit ? "Salvar alterações" : "Criar empresa"}</button>
      </div>
    </div>
  `;
  const nameEl = document.getElementById("c-name");
  const slugEl = document.getElementById("c-slug");
  const colorEl = document.getElementById("c-color");
  const logoInput = document.getElementById("c-logo");
  const previewEl = document.getElementById("logo-preview");

  if (!isEdit) {
    let slugTouched = false;
    slugEl.addEventListener("input", () => slugTouched = true);
    nameEl.addEventListener("input", () => {
      if (!slugTouched) slugEl.value = slugify(nameEl.value);
    });
  }

  colorEl.addEventListener("input", () => { colorAutoSet = false; });

  logoInput.addEventListener("change", async () => {
    const file = logoInput.files[0];
    if (!file) return;
    pendingFile = file;
    const { dataUrl, dominantColor } = await readLogoFile(file);
    previewEl.innerHTML = `<img src="${dataUrl}" style="max-width:100%;max-height:100%" />`;
    if (dominantColor && colorAutoSet) colorEl.value = dominantColor;
  });

  document.getElementById("salvar-btn").onclick = async () => {
    const name = nameEl.value.trim();
    const slug = isEdit ? existing.slug : slugify(slugEl.value);
    const color = colorEl.value;
    const errEl = document.getElementById("nova-error");
    const btn = document.getElementById("salvar-btn");
    errEl.style.display = "none";
    if (!name || !slug) {
      errEl.textContent = "Preencha o nome da empresa.";
      errEl.style.display = "block";
      return;
    }
    if (!isEdit) {
      const dup = await getDoc(doc(db, "companies", slug));
      if (dup.exists()) {
        errEl.textContent = "Já existe uma empresa com esse endereço. Escolha outro.";
        errEl.style.display = "block";
        return;
      }
    }
    btn.disabled = true;
    btn.textContent = "Salvando...";
    try {
      let logoUrl = isEdit ? (existing.logoUrl || null) : null;
      if (pendingFile) {
        btn.textContent = "Enviando logo...";
        logoUrl = await uploadLogo(slug, pendingFile);
      }
      const data = { name, slug, primaryColor: color, logoUrl };
      if (isEdit) {
        await setDoc(doc(db, "companies", slug), data, { merge: true });
      } else {
        data.createdAt = serverTimestamp();
        await setDoc(doc(db, "companies", slug), data);
      }
      navigate("#/admin");
    } catch (e) {
      btn.disabled = false;
      btn.textContent = isEdit ? "Salvar alterações" : "Criar empresa";
      errEl.textContent = "Não foi possível salvar. Tente novamente.";
      errEl.style.display = "block";
    }
  };
}

// ------------------------- RESPOSTAS (ADMIN) -----------------------------
async function renderRespostas(slug) {
  app.innerHTML = `<div class="wrap wide"><p class="muted">Carregando...</p></div>`;
  const compSnap = await getDoc(doc(db, "companies", slug));
  if (!compSnap.exists()) {
    app.innerHTML = `<div class="wrap"><p>Empresa não encontrada.</p><a href="#/admin">Voltar</a></div>`;
    return;
  }
  const company = compSnap.data();
  const respSnap = await getDocs(query(collection(db, "companies", slug, "responses"), orderBy("createdAt", "desc")));
  const responses = [];
  respSnap.forEach(d => responses.push({ id: d.id, ...d.data() }));

  const total = responses.length;
  const avg = total ? (responses.reduce((s, r) => s + Number(r.score), 0) / total).toFixed(1) : "-";
  const satisfeitos = responses.filter(r => Number(r.score) >= 4).length;
  const pctSatisfeitos = total ? Math.round((satisfeitos / total) * 100) : 0;

  const counts = LIKERT.map(l => responses.filter(r => Number(r.score) === l.value).length);
  const maxCount = Math.max(1, ...counts);

  const barRows = LIKERT.map((l, i) => `
    <div class="bar-row">
      <span class="emoji">${l.emoji}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${(counts[i] / maxCount) * 100}%;background:${l.color}"></div></div>
      <span class="count">${counts[i]}</span>
    </div>
  `).join("");

  const obsRows = responses.filter(r => r.observation).map(r => `
    <tr>
      <td>${likertOf(r.score).emoji} ${likertOf(r.score).label}</td>
      <td>${escapeHtml(r.observation)}</td>
      <td class="muted">${fmtDate(r.createdAt)}</td>
    </tr>
  `).join("");

  app.innerHTML = `
    <div class="wrap wide">
      <div class="top-bar">
        <div class="logo">Pesquisas de Satisfação · Admin</div>
        <a href="#/admin"><button class="secondary">Voltar</button></a>
      </div>
      <h1>${escapeHtml(company.name)}</h1>
      <p class="subtitle">${window.location.origin}${window.location.pathname}#/empresa/${slug}</p>

      <div class="stat-grid">
        <div class="stat"><div class="num">${total}</div><div class="lbl">Respostas</div></div>
        <div class="stat"><div class="num">${avg}</div><div class="lbl">Nota média (1–5)</div></div>
        <div class="stat"><div class="num">${pctSatisfeitos}%</div><div class="lbl">Satisfeitos (4–5)</div></div>
      </div>

      <div class="card">
        <h2>Distribuição das notas</h2>
        ${barRows}
      </div>

      <div class="card" style="padding:0">
        <div style="padding:20px 20px 0"><h2>Observações</h2></div>
        ${obsRows ? `<table style="padding:0 20px 20px"><thead><tr><th>Nota</th><th>Observação</th><th>Data</th></tr></thead><tbody>${obsRows}</tbody></table>`
          : `<p class="muted" style="padding:0 20px 20px">Nenhuma observação registrada ainda.</p>`}
      </div>
    </div>
  `;
}

// ------------------------- PÁGINA PÚBLICA --------------------------------
async function renderPublicSurvey(slug) {
  app.innerHTML = `<div class="center-screen"><p class="muted">Carregando...</p></div>`;
  const compSnap = await getDoc(doc(db, "companies", slug));
  if (!compSnap.exists()) {
    app.innerHTML = `<div class="center-screen"><p>Página não encontrada.</p></div>`;
    return;
  }
  const company = compSnap.data();
  document.documentElement.style.setProperty("--primary", company.primaryColor || "#2E2B28");
  document.title = "Pesquisa de satisfação — " + company.name;

  let selected = null;

  app.innerHTML = `
    <div class="wrap">
      <div id="survey-box">
        ${companyHeaderHtml(company)}
        <h1>${escapeHtml(company.name)}</h1>
        <p class="subtitle">Como foi sua experiência com a gente? Sua opinião nos ajuda a melhorar.</p>
        <div class="card">
          <div class="likert" id="likert-opts">
            ${LIKERT.map(l => `
              <button type="button" class="opt" data-val="${l.value}">
                <span class="emoji">${l.emoji}</span>
                <span class="lbl">${l.label}</span>
              </button>
            `).join("")}
          </div>
          <label style="margin-top:8px">Observação (opcional)</label>
          <textarea id="obs" placeholder="Conte um pouco mais sobre sua experiência"></textarea>
          <button id="enviar-btn" disabled style="width:100%">Enviar avaliação</button>
        </div>
      </div>
      <div id="thanks-box" style="display:none" class="thanks">
        <div class="big">✅</div>
        <h2>Obrigado pelo retorno!</h2>
        <p class="muted">Sua avaliação foi registrada com sucesso.</p>
        <button id="voltar-btn" class="secondary" style="margin-top:16px">Voltar para a avaliação</button>
        <p class="muted" id="timer-txt" style="margin-top:10px;font-size:12px"></p>
      </div>
    </div>
  `;

  const opts = app.querySelectorAll(".likert .opt");
  const enviarBtn = document.getElementById("enviar-btn");
  opts.forEach(btn => btn.onclick = () => {
    selected = Number(btn.dataset.val);
    opts.forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    enviarBtn.disabled = false;
  });

  enviarBtn.onclick = async () => {
    if (!selected) return;
    enviarBtn.disabled = true;
    enviarBtn.textContent = "Enviando...";
    const observation = document.getElementById("obs").value.trim();
    try {
      await addDoc(collection(db, "companies", slug, "responses"), {
        score: selected,
        observation: observation || null,
        createdAt: serverTimestamp()
      });
      document.getElementById("survey-box").style.display = "none";
      document.getElementById("thanks-box").style.display = "block";
      startReturnTimer(15);
    } catch (e) {
      enviarBtn.disabled = false;
      enviarBtn.textContent = "Enviar avaliação";
      alert("Não foi possível enviar. Tente novamente.");
    }
  };
}

// ------------------------- PÁGINA PÚBLICA: PÓS-VENDA ---------------------
async function renderPublicPosVenda(slug) {
  app.innerHTML = `<div class="center-screen"><p class="muted">Carregando...</p></div>`;
  const compSnap = await getDoc(doc(db, "companies", slug));
  if (!compSnap.exists()) {
    app.innerHTML = `<div class="center-screen"><p>Página não encontrada.</p></div>`;
    return;
  }
  const company = compSnap.data();
  document.documentElement.style.setProperty("--primary", company.primaryColor || "#2E2B28");
  document.title = "Pesquisa de experiência — " + company.name;

  const answers = {};

  const questionsHtml = POSVENDA_QUESTIONS.map((q, idx) => {
    const label = fillCompanyName(q.label, company.name);
    if (q.type === "stars") {
      return `
        <div class="q-block" data-q="${q.id}">
          <p class="q-label">${idx + 1}. ${escapeHtml(label)}</p>
          ${q.helper ? `<p class="q-helper">${escapeHtml(q.helper)}</p>` : ""}
          <div class="stars-row" data-stars="${q.id}">
            ${[1,2,3,4,5].map(v => `<button type="button" data-val="${v}">★</button>`).join("")}
          </div>
          <p class="stars-sub" id="sub-${q.id}"></p>
        </div>`;
    }
    if (q.type === "choice") {
      return `
        <div class="q-block" data-q="${q.id}">
          <p class="q-label">${idx + 1}. ${escapeHtml(label)}</p>
          <div class="choice-list" data-choice="${q.id}">
            ${q.options.map(opt => `<button type="button" data-val="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`).join("")}
          </div>
        </div>`;
    }
    if (q.type === "nps") {
      return `
        <div class="q-block" data-q="${q.id}">
          <p class="q-label">${idx + 1}. ${escapeHtml(label)}</p>
          <div class="nps-grid" data-nps="${q.id}">
            ${Array.from({length:11}, (_,v) => `<button type="button" data-val="${v}">${v}</button>`).join("")}
          </div>
          <div class="nps-caption"><span>Nada provável</span><span>Extremamente provável</span></div>
        </div>`;
    }
    // text
    return `
      <div class="q-block" data-q="${q.id}">
        <p class="q-label">${idx + 1}. ${escapeHtml(label)}</p>
        <textarea data-text="${q.id}" placeholder="Resposta aberta"></textarea>
      </div>`;
  }).join("");

  app.innerHTML = `
    <div class="wrap">
      <div id="survey-box">
        ${companyHeaderHtml(company)}
        <h1>Pesquisa de Experiência — ${escapeHtml(company.name)}</h1>
        <p class="subtitle">Olá! 😊 Sua opinião é muito importante para que possamos melhorar cada vez mais nosso atendimento. Leva menos de 1 minuto para responder.</p>
        <div class="card">
          ${questionsHtml}
          <button id="enviar-btn" disabled style="width:100%">Enviar avaliação</button>
        </div>
      </div>
      <div id="thanks-box" style="display:none" class="thanks">
        <div class="big">✅</div>
        <h2>Obrigado pelo retorno!</h2>
        <p class="muted">Sua avaliação foi registrada com sucesso.</p>
        <button id="voltar-btn" class="secondary" style="margin-top:16px">Voltar para a avaliação</button>
        <p class="muted" id="timer-txt" style="margin-top:10px;font-size:12px"></p>
      </div>
    </div>
  `;

  const enviarBtn = document.getElementById("enviar-btn");

  function checkComplete() {
    const ok = POSVENDA_QUESTIONS.every(q => !q.required || answers[q.id] !== undefined && answers[q.id] !== "");
    enviarBtn.disabled = !ok;
  }

  // estrelas
  app.querySelectorAll("[data-stars]").forEach(row => {
    const qid = row.dataset.stars;
    const q = POSVENDA_QUESTIONS.find(x => x.id === qid);
    const subEl = document.getElementById("sub-" + qid);
    row.querySelectorAll("button").forEach(btn => btn.onclick = () => {
      const val = Number(btn.dataset.val);
      answers[qid] = val;
      row.querySelectorAll("button").forEach(b => b.classList.toggle("filled", Number(b.dataset.val) <= val));
      if (q.starLabels) subEl.textContent = q.starLabels[val - 1];
      checkComplete();
    });
  });

  // múltipla escolha
  app.querySelectorAll("[data-choice]").forEach(row => {
    const qid = row.dataset.choice;
    row.querySelectorAll("button").forEach(btn => btn.onclick = () => {
      answers[qid] = btn.dataset.val;
      row.querySelectorAll("button").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      checkComplete();
    });
  });

  // escala nps 0-10
  app.querySelectorAll("[data-nps]").forEach(row => {
    const qid = row.dataset.nps;
    row.querySelectorAll("button").forEach(btn => btn.onclick = () => {
      answers[qid] = Number(btn.dataset.val);
      row.querySelectorAll("button").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      checkComplete();
    });
  });

  // texto aberto
  app.querySelectorAll("[data-text]").forEach(ta => {
    ta.oninput = () => { answers[ta.dataset.text] = ta.value.trim(); checkComplete(); };
  });

  enviarBtn.onclick = async () => {
    enviarBtn.disabled = true;
    enviarBtn.textContent = "Enviando...";
    try {
      await addDoc(collection(db, "companies", slug, "posvenda_responses"), {
        answers, createdAt: serverTimestamp()
      });
      document.getElementById("survey-box").style.display = "none";
      document.getElementById("thanks-box").style.display = "block";
      startReturnTimer(15);
    } catch (e) {
      enviarBtn.disabled = false;
      enviarBtn.textContent = "Enviar avaliação";
      alert("Não foi possível enviar. Tente novamente.");
    }
  };
}

// ------------------------- RESULTADOS: PÓS-VENDA (ADMIN) -----------------
async function renderPosVendaResultados(slug) {
  app.innerHTML = `<div class="wrap wide"><p class="muted">Carregando...</p></div>`;
  const compSnap = await getDoc(doc(db, "companies", slug));
  if (!compSnap.exists()) {
    app.innerHTML = `<div class="wrap"><p>Empresa não encontrada.</p><a href="#/admin">Voltar</a></div>`;
    return;
  }
  const company = compSnap.data();
  const respSnap = await getDocs(query(collection(db, "companies", slug, "posvenda_responses"), orderBy("createdAt", "desc")));
  const responses = [];
  respSnap.forEach(d => responses.push({ id: d.id, ...d.data() }));
  const total = responses.length;

  const blocks = POSVENDA_QUESTIONS.map((q, idx) => {
    const label = fillCompanyName(q.label, company.name);
    const vals = responses.map(r => r.answers ? r.answers[q.id] : undefined).filter(v => v !== undefined && v !== "");

    if (q.type === "stars") {
      const avg = vals.length ? (vals.reduce((s, v) => s + Number(v), 0) / vals.length).toFixed(1) : "-";
      const counts = [1,2,3,4,5].map(v => vals.filter(x => Number(x) === v).length);
      const max = Math.max(1, ...counts);
      const rows = [1,2,3,4,5].map((v, i) => `
        <div class="bar-row">
          <span class="emoji" style="width:44px">${"★".repeat(v)}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${(counts[i]/max)*100}%"></div></div>
          <span class="count">${counts[i]}</span>
        </div>`).join("");
      return `<div class="card"><h2>${idx+1}. ${escapeHtml(label)} <span class="muted" style="font-weight:400">— média ${avg}</span></h2>${rows}</div>`;
    }
    if (q.type === "choice") {
      const counts = q.options.map(opt => vals.filter(x => x === opt).length);
      const max = Math.max(1, ...counts);
      const rows = q.options.map((opt, i) => `
        <div class="bar-row">
          <span class="muted" style="width:170px;font-size:12px">${escapeHtml(opt)}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${(counts[i]/max)*100}%"></div></div>
          <span class="count">${counts[i]}</span>
        </div>`).join("");
      return `<div class="card"><h2>${idx+1}. ${escapeHtml(label)}</h2>${rows}</div>`;
    }
    if (q.type === "nps") {
      const avg = vals.length ? (vals.reduce((s, v) => s + Number(v), 0) / vals.length).toFixed(1) : "-";
      const promotores = vals.filter(v => v >= 9).length;
      const neutros = vals.filter(v => v >= 7 && v <= 8).length;
      const detratores = vals.filter(v => v <= 6).length;
      const pct = n => vals.length ? Math.round((n/vals.length)*100) : 0;
      return `
        <div class="card">
          <h2>${idx+1}. ${escapeHtml(label)} <span class="muted" style="font-weight:400">— média ${avg}</span></h2>
          <div class="stat-grid" style="margin-bottom:0">
            <div class="stat"><div class="num" style="color:#2E7D32">${pct(promotores)}%</div><div class="lbl">Promotores (9–10)</div></div>
            <div class="stat"><div class="num" style="color:#B8976A">${pct(neutros)}%</div><div class="lbl">Neutros (7–8)</div></div>
            <div class="stat"><div class="num" style="color:#C0392B">${pct(detratores)}%</div><div class="lbl">Detratores (0–6)</div></div>
          </div>
        </div>`;
    }
    // text
    const rows = responses.filter(r => r.answers && r.answers[q.id]).map(r => `
      <tr><td>${escapeHtml(r.answers[q.id])}</td><td class="muted" style="width:150px">${fmtDate(r.createdAt)}</td></tr>
    `).join("");
    return `
      <div class="card" style="padding:0">
        <div style="padding:20px 20px 0"><h2>${idx+1}. ${escapeHtml(label)}</h2></div>
        ${rows ? `<table style="padding:0 20px 20px"><tbody>${rows}</tbody></table>` : `<p class="muted" style="padding:0 20px 20px">Nenhuma resposta ainda.</p>`}
      </div>`;
  }).join("");

  app.innerHTML = `
    <div class="wrap wide">
      <div class="top-bar">
        <div class="logo">Pesquisas de Satisfação · Admin</div>
        <a href="#/admin"><button class="secondary">Voltar</button></a>
      </div>
      <h1>${escapeHtml(company.name)} — Pós-venda</h1>
      <p class="subtitle">${window.location.origin}${window.location.pathname}#/empresa/${slug}/pos-venda</p>
      <div class="stat-grid">
        <div class="stat"><div class="num">${total}</div><div class="lbl">Respostas</div></div>
      </div>
      ${total === 0 ? `<div class="card"><p class="muted">Nenhuma resposta registrada ainda.</p></div>` : blocks}
    </div>
  `;
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

render();
</script>
</body>
</html>
